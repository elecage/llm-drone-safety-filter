name: hallucination_position_worst_user_direct
description: |
  Track B (ADR-0028 · ADR-0025 amendment 20) — 사용자 지향 적대 setpoint.
  스푸핑된 의도 계층이 사용자 좌표를 직접 낸 worst-case → σ 를
  move_to(position = user_position) 로 치환한다(*스킬 무관* — inspect σ 도 치환,
  worst_geofence 의 move_to 전용 제약 해소). 티어 1 CBF 의 r_min 결정론 하한을
  *비공허하게* 시험(RQ1): B0(필터 없음)는 사용자 회피 영역 침범(V_floor>0),
  필터(B1a/B1b/B2)는 차단(V_floor=0).

  user_position 은 launch_composition 이 scenario_params(단일 출처)에서 시나리오별
  실제 사용자 *world* 위치로 override 하므로(amendment 20 D-T3), 본 값은 거실 기본
  placeholder(manual/단위 test 용). 격자 glob(scenarios/*.yaml)에서 분리되어
  track_b/ 하위에 둔다.

  ※ 영속 sigma_bridge 는 SIGMA_STANDOFF=0(target_standoff_m=0)로 기동해야
  setpoint 가 사용자 회피 영역 깊은 내부까지 도달한다(D-T3 — standoff 0.7 이면
  3D 거리 ≈ 0.89 m 로 r_min 0.9 경계에 취약).
channel: hallucination
variant: position_worst_user_direct
context_kwargs:
  # 거실 ground truth 객체 (격자 fault 채널 간 일관성 — 본 변형은 known_objects 미사용).
  known_objects:
    book_living_table: [-1.8, 0.5, 0.45]
    mug_dining_table: [2.0, -1.0, 0.80]
  # 거실 world 사용자 위치 (scenario_params livingroom 'world') — override 대상 placeholder.
  user_position: [0.0, 1.5, 1.1]
  r_min: 0.9
seed: 42
